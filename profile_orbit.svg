<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 480" width="100%">
  <defs>
    <!-- Deep Space Background Gradient -->
    <linearGradient id="space-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="50%" stop-color="#0a0a22"/>
      <stop offset="100%" stop-color="#04040c"/>
    </linearGradient>

    <!-- Nebula Glow Gradients -->
    <radialGradient id="nebula-purple" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7b61ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebula-cyan" cx="80%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebula-magenta" cx="50%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#ff00aa" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff00aa" stop-opacity="0"/>
    </radialGradient>

    <!-- Star Core Glows -->
    <radialGradient id="tech-star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#d1c7ff"/>
      <stop offset="60%" stop-color="#7b61ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="sandbox-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="career-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b61ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="kisan-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    /* Twinkling Star Animations */
    @keyframes twinkle-slow {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.85; }
    }
    @keyframes twinkle-mid {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes twinkle-fast {
      0%, 100% { opacity: 0.2; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .star-s { fill: #ffffff; animation: twinkle-slow infinite ease-in-out; }
    .star-m { fill: #e5ebff; animation: twinkle-mid infinite ease-in-out; }
    .star-f { fill: #e0f7ff; animation: twinkle-fast infinite ease-in-out; }

    /* Orbital Motion */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1); opacity: 0.9; }
    }

    .spin-group {
      transform-origin: 220px 240px;
      animation: spin linear infinite;
    }
    
    .orbit-inner { animation-duration: 10s; }
    .orbit-mid { animation-duration: 18s; }
    .orbit-outer { animation-duration: 30s; }

    .tech-star {
      transform-origin: 220px 240px;
      animation: pulse 5s ease-in-out infinite;
    }

    /* Interactive Elements Hover */
    .interactive-link {
      cursor: pointer;
      text-decoration: none;
    }
    .sandbox-link:hover .planet-body {
      filter: drop-shadow(0 0 10px #00f0ff);
      stroke: #00f0ff;
    }
    .career-link:hover .planet-body {
      filter: drop-shadow(0 0 10px #7b61ff);
      stroke: #7b61ff;
    }
    .kisan-link:hover .planet-body {
      filter: drop-shadow(0 0 10px #00ff88);
      stroke: #00ff88;
    }
    .star-link:hover .star-body {
      filter: drop-shadow(0 0 20px #7b61ff);
      stroke: #ffffff;
    }

    /* Font Styles */
    .font-hud {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
    }
    .font-mono {
      font-family: 'Fira Code', monospace;
    }

    .title-banner {
      font-size: 15px;
      font-weight: 700;
      fill: #ffffff;
      letter-spacing: 2px;
    }
    .sec-header {
      font-size: 11px;
      font-weight: 700;
      fill: #7b61ff;
      letter-spacing: 1.5px;
    }
    .text-body {
      font-size: 11px;
      fill: #a2a8cc;
    }
    .text-value {
      font-size: 11px;
      fill: #f0f2fc;
      font-weight: 600;
    }
    .badge-bg {
      fill: rgba(123, 97, 255, 0.1);
      stroke: rgba(123, 97, 255, 0.3);
    }
  </style>

  <!-- ==================== BACKGROUND UNIVERSE ==================== -->
  <rect width="850" height="480" rx="20" fill="url(#space-bg)" stroke="rgba(123, 97, 255, 0.25)" stroke-width="2"/>
  <rect width="850" height="480" rx="20" fill="url(#nebula-purple)"/>
  <rect width="850" height="480" rx="20" fill="url(#nebula-cyan)"/>
  <rect width="850" height="480" rx="20" fill="url(#nebula-magenta)"/>

  <!-- Twinkling Starfield -->
  <circle cx="50" cy="80" r="1" class="star-s" style="animation-duration: 4s;"/>
  <circle cx="120" cy="40" r="1.5" class="star-m" style="animation-duration: 3s;"/>
  <circle cx="85" cy="180" r="1" class="star-f" style="animation-duration: 2s;"/>
  <circle cx="320" cy="70" r="1.2" class="star-m" style="animation-duration: 5s;"/>
  <circle cx="280" cy="130" r="1" class="star-s" style="animation-duration: 3.5s;"/>
  <circle cx="70" cy="380" r="1.5" class="star-m" style="animation-duration: 4.2s;"/>
  <circle cx="150" cy="420" r="1" class="star-f" style="animation-duration: 1.8s;"/>
  <circle cx="350" cy="400" r="1.2" class="star-s" style="animation-duration: 6s;"/>
  <circle cx="390" cy="270" r="1" class="star-m" style="animation-duration: 3.8s;"/>
  <circle cx="430" cy="90" r="1.5" class="star-f" style="animation-duration: 2.5s;"/>
  <circle cx="470" cy="40" r="1" class="star-s" style="animation-duration: 5.2s;"/>
  <circle cx="580" cy="75" r="1.2" class="star-m" style="animation-duration: 4.6s;"/>
  <circle cx="670" cy="110" r="1" class="star-f" style="animation-duration: 2.2s;"/>
  <circle cx="790" cy="50" r="1.5" class="star-s" style="animation-duration: 3s;"/>
  <circle cx="820" cy="180" r="1" class="star-m" style="animation-duration: 4s;"/>
  <circle cx="710" cy="220" r="1.2" class="star-f" style="animation-duration: 2.7s;"/>
  <circle cx="800" cy="340" r="1" class="star-s" style="animation-duration: 5.8s;"/>
  <circle cx="730" cy="420" r="1.5" class="star-m" style="animation-duration: 3.2s;"/>
  <circle cx="610" cy="410" r="1" class="star-f" style="animation-duration: 2.1s;"/>
  <circle cx="500" cy="430" r="1.2" class="star-s" style="animation-duration: 4.8s;"/>
  <circle cx="20" cy="270" r="1" class="star-m" style="animation-duration: 3.6s;"/>

  <!-- HUD Spacecraft Boundaries / Grid -->
  <line x1="435" y1="25" x2="435" y2="455" stroke="rgba(123, 97, 255, 0.15)" stroke-width="1.5" stroke-dasharray="8 4"/>

  <!-- ==================== ORBIT SOLAR SYSTEM (LEFT) ==================== -->
  
  <!-- Orbit Circles -->
  <circle cx="220" cy="240" r="70" fill="none" stroke="rgba(123, 97, 255, 0.12)" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="220" cy="240" r="120" fill="none" stroke="rgba(123, 97, 255, 0.12)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="220" cy="240" r="165" fill="none" stroke="rgba(123, 97, 255, 0.12)" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- Central Star (Tech Core) -->
  <a href="https://leetcode.com/u/shrenikapatil2/" target="_blank" class="interactive-link star-link">
    <g class="tech-star">
      <circle cx="220" cy="240" r="36" fill="url(#tech-star-glow)"/>
      <circle cx="220" cy="240" r="16" fill="#ffffff" class="star-body" filter="drop-shadow(0 0 6px #7b61ff)"/>
      <text x="220" y="243" text-anchor="middle" font-family="sans-serif" font-size="8px" font-weight="900" fill="#0b0c16" letter-spacing="0.5px">TECH</text>
    </g>
  </a>

  <!-- Orbiting Planet 1: Sandbox-IX -->
  <g class="spin-group orbit-inner">
    <a href="https://github.com/shrenika2/distributed-interview-sandbox" target="_blank" class="interactive-link sandbox-link">
      <circle cx="220" cy="170" r="15" fill="url(#sandbox-glow)" opacity="0.45"/>
      <circle cx="220" cy="170" r="7.5" fill="#00f0ff" class="planet-body" stroke="#0b0c16" stroke-width="1.5"/>
    </a>
  </g>

  <!-- Orbiting Planet 2: CareerGrid -->
  <g class="spin-group orbit-mid">
    <a href="https://github.com/shrenika2/CareerGrid" target="_blank" class="interactive-link career-link">
      <circle cx="340" cy="240" r="20" fill="url(#career-glow)" opacity="0.45"/>
      <circle cx="340" cy="240" r="9.5" fill="#7b61ff" class="planet-body" stroke="#0b0c16" stroke-width="1.5"/>
    </a>
  </g>

  <!-- Orbiting Planet 3: KisanSetu -->
  <g class="spin-group orbit-outer">
    <a href="https://github.com/shrenika2/KISAN" target="_blank" class="interactive-link kisan-link">
      <circle cx="220" cy="75" r="22" fill="url(#kisan-glow)" opacity="0.45"/>
      <circle cx="220" cy="75" r="10.5" fill="#00ff88" class="planet-body" stroke="#0b0c16" stroke-width="1.5"/>
    </a>
  </g>

  <!-- ==================== SPACESHIP HUD LOGS (RIGHT) ==================== -->
  
  <g transform="translate(460, 40)">
    
    <!-- Title -->
    <text x="0" y="10" class="font-hud title-banner">🌌 CAPTAIN'S LOG: SHRENIKA PATIL</text>
    <line x1="0" y1="20" x2="350" y2="20" stroke="rgba(123, 97, 255, 0.2)" stroke-width="1.5"/>

    <!-- Credentials Block -->
    <g transform="translate(0, 35)" class="font-mono">
      <text x="0" y="10" class="text-body"><tspan fill="#7b61ff">Vessel  :</tspan> Walchand-CSE-Starship (B.Tech CSE, 2028)</text>
      <text x="0" y="26" class="text-body"><tspan fill="#7b61ff">Sector  :</tspan> Sangli, Maharashtra, India</text>
      <text x="0" y="42" class="text-body"><tspan fill="#7b61ff">Rank    :</tspan> <tspan fill="#FFA116" font-weight="bold">LeetCode Knight [1878 AP | Top 5%]</tspan></text>
    </g>

    <!-- Interactive Navigation Map Header -->
    <g transform="translate(0, 105)" class="font-hud">
      <text x="0" y="10" class="sec-header">PLANETARY TELEMETRY HUD (CLICK PLANETS)</text>
      
      <!-- Planet 1 Info -->
      <a href="https://github.com/shrenika2/distributed-interview-sandbox" target="_blank" class="interactive-link sandbox-link">
        <g transform="translate(0, 20)">
          <circle cx="6" cy="6" r="4.5" fill="#00f0ff"/>
          <text x="18" y="10" class="text-value">Sandbox-IX: Docker Container Executor</text>
          <text x="18" y="22" class="text-body" font-size="9.5px">CPU/RAM limits (cgroups), low latency Socket.IO pipeline</text>
        </g>
      </a>

      <!-- Planet 2 Info -->
      <a href="https://github.com/shrenika2/CareerGrid" target="_blank" class="interactive-link career-link">
        <g transform="translate(0, 65)">
          <circle cx="6" cy="6" r="4.5" fill="#7b61ff"/>
          <text x="18" y="10" class="text-value">CareerGrid-Alpha: Decoupled Placement Grid</text>
          <text x="18" y="22" class="text-body" font-size="9.5px">FastAPI microservices, WebSockets, Jest hardened API</text>
        </g>
      </a>

      <!-- Planet 3 Info -->
      <a href="https://github.com/shrenika2/KISAN" target="_blank" class="interactive-link kisan-link">
        <g transform="translate(0, 110)">
          <circle cx="6" cy="6" r="4.5" fill="#00ff88"/>
          <text x="18" y="10" class="text-value">KisanSetu: Voice AI Marketplace</text>
          <text x="18" y="22" class="text-body" font-size="9.5px">Groq LLaMA bilingual voice listings, Stripe escrow escrow</text>
        </g>
      </a>
    </g>

    <!-- Starship Sub-Systems (Skills Badges) -->
    <g transform="translate(0, 265)" class="font-hud">
      <text x="0" y="10" class="sec-header">STARSHIP SUB-SYSTEMS</text>
      
      <!-- Tech badges -->
      <g transform="translate(0, 20)">
        <!-- propulsion -->
        <rect x="0" y="0" width="105" height="18" rx="4" class="badge-bg"/>
        <text x="52" y="12" text-anchor="middle" class="font-mono text-body" fill="#f0f2fc" font-size="9.5px">🚀 C++ / Python</text>

        <rect x="112" y="0" width="105" height="18" rx="4" class="badge-bg"/>
        <text x="164" y="12" text-anchor="middle" class="font-mono text-body" fill="#f0f2fc" font-size="9.5px">⚡ Node / FastAPI</text>

        <rect x="224" y="0" width="115" height="18" rx="4" class="badge-bg"/>
        <text x="281" y="12" text-anchor="middle" class="font-mono text-body" fill="#f0f2fc" font-size="9.5px">📦 Docker / Redis</text>

        <!-- second row of badges -->
        <rect x="0" y="24" width="120" height="18" rx="4" class="badge-bg"/>
        <text x="60" y="36" text-anchor="middle" class="font-mono text-body" fill="#f0f2fc" font-size="9.5px">💾 Postgres/MongoDB</text>

        <rect x="127" y="24" width="100" height="18" rx="4" class="badge-bg"/>
        <text x="177" y="36" text-anchor="middle" class="font-mono text-body" fill="#f0f2fc" font-size="9.5px">🛡️ cgroups/Linux</text>

        <rect x="234" y="24" width="105" height="18" rx="4" class="badge-bg"/>
        <text x="286" y="36" text-anchor="middle" class="font-mono text-body" fill="#f0f2fc" font-size="9.5px">⚙️ Socket.IO/Jest</text>
      </g>
    </g>

    <!-- Fleet achievements -->
    <g transform="translate(0, 360)" class="font-hud">
      <text x="0" y="10" class="sec-header">FLEET COMMENDATIONS (ACHIEVEMENTS)</text>
      <text x="0" y="24" class="text-body" font-size="9.5px">✦ <tspan fill="#ffffff">CodeChef Main Secretary:</tspan> Directed contests for 200+ CP cadets</text>
      <text x="0" y="36" class="text-body" font-size="9.5px">✦ <tspan fill="#ffffff">TechFiesta 2026 Finalist:</tspan> Global Top 60 out of 700+ crews</text>
      <text x="0" y="48" class="text-body" font-size="9.5px">✦ <tspan fill="#ffffff">Reliance Scholar (2024):</tspan> Top 5000 national award based on merit</text>
    </g>

  </g>
</svg>
